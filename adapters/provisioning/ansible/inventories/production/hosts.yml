all:
  children:
    # GCP — Projeto: ruptur-jarvis-v1-68358
    # Zona: southamerica-east1-b
    # Acesso: ssh -i ~/.ssh/google_compute_engine diego@34.39.196.137
    shipyard:
      hosts:
        ruptur-shipyard-01:
          ansible_host: "34.176.34.240"
          ansible_user: "diego"
          ansible_ssh_private_key_file: "~/.ssh/google_compute_engine"
          gcp_project: "ruptur-jarvis-v1-68358"
          gcp_zone: "southamerica-west1-a"

    # GCP — Host dedicado ao runtime de IA (Ollama)
    # Provisionar via: cd adapters/ruptur-forge/terraform/projects/ai-host && terraform apply
    # Após apply: substitua PENDING_TERRAFORM_APPLY pelo ip externo em ansible_host
    #             e pelo ip interno em ai_host_ip (group_vars/all.yml)
    # Baseline atual: southamerica-east1-c / n1-standard-16 / 1x T4 / Debian 12
    ai_host:
      hosts:
        ruptur-ai-host-01:
          ansible_host: "PENDING_TERRAFORM_APPLY"
          ansible_user: "diego"
          ansible_ssh_private_key_file: "~/.ssh/google_compute_engine"
          gcp_project: "ruptur-jarvis-v1-68358"
          gcp_zone: "southamerica-east1-c"

    # Oracle Cloud — legado ativo (débito técnico)
    # oracle-prod: RUNNING (80% disco, remover baileys+ruptur-web legados)
    # oracle-test: SSH key issue (débito técnico)
    oracle:
      hosts:
        oracle-prod:
          ansible_host: "167.234.228.71"
          ansible_user: "ubuntu"
          ansible_ssh_private_key_file: "~/.ssh/id_ed25519"

    # Workstation local (macOS)
    local:
      hosts:
        localhost:
          ansible_connection: local
          ansible_python_interpreter: "{{ ansible_playbook_python }}"
