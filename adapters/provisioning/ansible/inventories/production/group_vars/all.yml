shipyard_jarvis_manage_existing_runtime_only: true
shipyard_jarvis_autostart: false
shipyard_jarvis_validate_session_persistence: false

# -----------------------------------------------------------------------
# AI Host dedicado ao Ollama
# Após `terraform apply` em adapters/ruptur-forge/terraform/projects/ai-host:
#   1. Copie `ai_host_internal_ip` para ai_host_ip abaixo
#   2. Copie `ai_host_external_ip` para ansible_host do grupo ai_host
#   3. Aguarde o bootstrap de GPU estabilizar o host (startup-script + reboot)
#   4. Execute: ansible-playbook playbooks/ai_host_gcp.yml
#   5. Re-execute: ansible-playbook playbooks/jarvis_gcp.yml
#   6. Re-execute: ansible-playbook playbooks/aiox_gcp.yml
# -----------------------------------------------------------------------
ai_host_ip: "PENDING_TERRAFORM_APPLY"
ai_host_ollama_port: 11434
ai_host_ollama_base_url: "http://{{ ai_host_ip }}:{{ ai_host_ollama_port }}/v1"
shipyard_ai_host_expected_debian_major_version: "12"
shipyard_ai_host_gpu_enabled: true
shipyard_ollama_default_model: "qwen3:8b"
shipyard_ollama_boot_models:
  - "qwen3:8b"
  - "qwen2.5-coder:7b"
  - "qwen3:4b"

shipyard_aiox_enabled: true
shipyard_aiox_model_profile: qwen
shipyard_aiox_hermes_base_url: "{{ ai_host_ollama_base_url }}"
shipyard_aiox_hermes_model: hermes
shipyard_aiox_gemma4_model: gemma4:latest
shipyard_aiox_qwen_model: "{{ shipyard_ollama_default_model }}"

# Diretório canônico do Terraform dentro do Estaleiro
terraform_project_dir: /Users/diego/dev/ruptur-cloud/ruptur-main/shipyard/adapters/ruptur-forge/terraform

shipyard_images:
  traefik: traefik:v3.1
  portainer: portainer/portainer-ce:lts
  postgres: postgres:16
  redis: redis:7
  n8n: docker.n8n.io/n8nio/n8n:1
  minio: minio/minio:RELEASE.2025-02-03T21-03-04Z-cpuv1
