---
- name: Instalar pré-requisitos do repositório Docker
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Garantir diretório de keyrings do apt
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Baixar chave GPG do Docker
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Adicionar repositório oficial do Docker
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ docker_arch_map.get(ansible_facts.architecture, 'amd64') }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/debian {{ ansible_facts.distribution_release }} stable
    state: present
    filename: docker

- name: Instalar Docker Engine e Compose plugin
  ansible.builtin.apt:
    name: "{{ docker_apt_packages }}"
    state: present
    update_cache: true

- name: Garantir serviço Docker ativo
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Adicionar usuário administrador ao grupo docker
  ansible.builtin.user:
    name: "{{ shipyard_admin_user }}"
    groups: docker
    append: true
  when: shipyard_admin_user | length > 0

- name: Garantir diretório de override do systemd para o Docker
  ansible.builtin.file:
    path: /etc/systemd/system/docker.service.d
    state: directory
    mode: "0755"

- name: Configurar workaround de API mínima do Docker para clientes legados
  ansible.builtin.copy:
    dest: /etc/systemd/system/docker.service.d/10-min-api-version.conf
    mode: "0644"
    content: |
      [Service]
      Environment="DOCKER_MIN_API_VERSION={{ docker_min_api_version }}"
  notify: Reiniciar Docker
