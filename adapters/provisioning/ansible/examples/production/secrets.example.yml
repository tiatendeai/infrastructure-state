# Exemplo rastreável dos segredos esperados pelo runtime.
# Copie para `infra/ansible/inventories/production/group_vars/secrets.yml`
# apenas no ambiente local/operacional, fora do Git.
shipyard_traefik_dashboard_basicauth: "admin:$$apr1$$CHANGE_ME"
shipyard_portainer_admin_password_hash: "$$2y$$05$$CHANGE_ME_PORTAINER_HASH"
shipyard_postgres_db: "shipyard"
shipyard_postgres_user: "shipyard"
shipyard_postgres_password: "CHANGE_ME_POSTGRES_PASSWORD"
shipyard_redis_password: "CHANGE_ME_REDIS_PASSWORD"
shipyard_n8n_db: "n8n"
shipyard_n8n_user: "n8n"
shipyard_n8n_password: "CHANGE_ME_N8N_DB_PASSWORD"
shipyard_n8n_encryption_key: "CHANGE_ME_32CHARS_MINIMUM"
shipyard_minio_root_user: "minioadmin"
shipyard_minio_root_password: "CHANGE_ME_MINIO_PASSWORD"
shipyard_uazapi_api_token: "PENDING_UAZAPI_TOKEN"
shipyard_uazapi_webhook_secret: "CHANGE_ME_UAZAPI_WEBHOOK_SECRET"
shipyard_jarvis_uazapi_admin_token: "PENDING_JARVIS_UAZAPI_ADMIN_TOKEN"
shipyard_jarvis_uazapi_instance_token: "PENDING_JARVIS_UAZAPI_INSTANCE_TOKEN"
shipyard_jarvis_allowed_user_ids: "5531999999999"
shipyard_jarvis_gemini_api_key: "PENDING_JARVIS_GEMINI_API_KEY"
shipyard_jarvis_openrouter_api_key: "PENDING_JARVIS_OPENROUTER_API_KEY"
shipyard_jarvis_groq_api_key: "PENDING_JARVIS_GROQ_API_KEY"
shipyard_jarvis_deepseek_api_key: "PENDING_JARVIS_DEEPSEEK_API_KEY"
